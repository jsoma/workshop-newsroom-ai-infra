title: "Newsroom Infrastructure for AI Experimentation"
description: "Small local demos for OCR, text-to-speech, semantic PDF search, and Streamlit data browsing."
author: "Jonathan Soma"
conference_label: "Dataharvest 2026"
github_repo: "jsoma/workshop-newsroom-ai-infra"
github_branch: "main"
output_dir: "docs"
execution_environment: "project"
slides: "AI Experimentation.pptx"
codespaces:
  port_visibility: public
default_install: []

sections:
  - title: "01. OCR"
    folder: "."
    markdown: false
    description: "Journalists often deal with scanned texts, but the best tools are locked behind code. How can we help non-technical users try out our favorite libaries without forcing them through installing Python and running notebooks?"
    notebooks:
      "01-gradio-ocr-simple.ipynb":
        title: "OCR with Gradio: simple"
        description: "A tiny PDF OCR interface using RapidOCR."
        order: 1
        install:
          - gradio
          - ipywidgets
          - pymupdf
          - rapidocr
          - opencv-python-headless
          - onnxruntime
      "01-gradio-ocr-fancy.ipynb":
        title: "OCR with Gradio: fancy"
        description: "A richer OCR interface comparing RapidOCR with Nanonets OCR2."
        order: 2
        install:
          upgrade: false
          packages:
            - gradio
            - ipywidgets
            - pymupdf
            - rapidocr
            - opencv-python-headless
            - onnxruntime
            - pillow
            - torch
            - torchvision
            - "transformers>=4.57.0"
            - accelerate
            - sentencepiece

  - title: "02. Text-to-speech"
    folder: "."
    markdown: false
    description: "Newsrooms' C-suites have *loved* auto-generated podcasts recently, but the rest of the publication is often split. How can we let everyone have a hand in demoing the product to show its strengths and weaknesses?"
    notebooks:
      "02-gradio-tts-simple.ipynb":
        title: "Text-to-speech with Gradio: simple"
        description: "A small Kokoro ONNX text-to-speech demo."
        order: 1
        install:
          - gradio
          - ipywidgets
          - kokoro-onnx
          - onnxruntime
          - requests
          - numpy
          - soundfile
      "02-gradio-tts-fancy.ipynb":
        title: "Text-to-speech with Gradio: fancy"
        description: "A larger TTS demo with Kokoro ONNX and MMS options."
        order: 2
        install:
          - gradio
          - ipywidgets
          - kokoro-onnx
          - onnxruntime
          - requests
          - numpy
          - soundfile
          - torch
          - transformers
          - sentencepiece

  - title: "03. PDF search"
    folder: "."
    markdown: false
    description: "Semantic search is a useful tool for investigative work, but you don't always want to upload all of your docs into a Google product. Can a home-grown version work just as well?"
    notebooks:
      "03-streamlit-pdf-search-manual.ipynb":
        title: "PDF Search: notebook version"
        description: "A notebook walkthrough that reads local PDFs, embeds each page, and ranks semantic search results. This will only work on codespaces!"
        order: 1
        install:
          - ipywidgets
          - pymupdf
          - pandas
          - sentence-transformers
    apps:
      - path: "03-streamlit-pdf-search.py"
        title: "PDF Search: Streamlit app"
        description: "Semantic search over local PDFs using sentence-transformer embeddings."
        order: 2
        kind: "streamlit"
        command: "uv run streamlit run 03-streamlit-pdf-search.py --server.address 0.0.0.0 --server.port 8501"
        port: 8501
  - title: "04. Transfer data"
    folder: "."
    notebooks: false
    markdown: false
    description: "Tired of doing data analysis for all of your coworkers? Give them the tools to browse the data directly themselves!"
    notebooks:
      "04-transfers.ipynb":
        title: "Analyzing Real Estate transfers the normal way"
        description: "A notebook that opens up a CSV and does a little light analysis."
        order: 1
        install:
          - pandas
        data_files:
          - "data/transfers.csv"
    apps:
      - path: "04-streamlit-transfers-simple.py"
        title: "Real Estate Transfers Browser: simple version"
        description: "A simple Streamlit browser for local property transfer data."
        order: 2
        kind: "streamlit"
        command: "uv run streamlit run 04-streamlit-transfers-simple.py --server.address 0.0.0.0 --server.port 8502"
        port: 8502
      - path: "04-streamlit-transfers-fancy.py"
        title: "Real Estate Transfers Browser: fancy version"
        description: "A fuller Streamlit transfer-data app with charts, filters, and summaries."
        order: 3
        kind: "streamlit"
        command: "uv run streamlit run 04-streamlit-transfers-fancy.py --server.address 0.0.0.0 --server.port 8503"
        port: 8503
    downloads:
      - "data/transfers.csv"

  - title: "05. Evaluations"
    folder: "data/evaluations"
    notebooks: false
    markdown: false
    description: |
      Use [Braintrust](https://www.braintrust.dev/) for evaluation workflows, then use the CSV files here as small local datasets to test with.

      Download the CSVs from the section's **Download materials** link.
    downloads:
      - "*.csv"

  - title: "06. Structured outputs"
    folder: "."
    markdown: false
    notebooks:
      "06-openrouter-pydantic.ipynb":
        title: "OpenRouter + Pydantic AI"
        description: "Use Pydantic AI with OpenRouter to ask questions and request structured outputs."
        order: 1
        install:
          - ipywidgets
          - pandas
          - pydantic-ai-slim[openrouter]
          - python-dotenv
          - tqdm
